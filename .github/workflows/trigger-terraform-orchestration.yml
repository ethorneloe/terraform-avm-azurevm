# Purpose:
#   - To orchestrate code analysis, Terraform plan, and optional apply steps across all changed
#     virtual machine configurations in infrastructure/virtual-machines/.
#   - Follows the same environment routing as terraform-azurerm-law-dcr:
#       dev   → non-main branch pushes   (plan + apply)
#       test  → pull requests to main    (plan only, security analysis enabled)
#       prod  → push to main             (plan + apply, security analysis enabled)
#   - Each VM directory is processed independently using its own env/<env>/<env>.tfbackend
#     and env/<env>/<env>.tfvars files.
#
# Prerequisites:
#   - GitHub Secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, TF_LOG_LEVEL
#   - GitHub Environments configured: dev, test, prod
#     (prod environment should have required-reviewers protection rule)
#   - Each VM directory must contain env/<env>/<env>.tfbackend and env/<env>/<env>.tfvars
#     See templates/vm/env/ for file templates.
#
# Notes:
#   - GitHub Actions does not support strategy.matrix with reusable workflow_call jobs.
#     Changed VM directories are therefore processed sequentially within a single job.
#   - The terraform-orchestration.yml reusable workflow is available for targeting a
#     specific VM + environment directly (e.g. workflow_dispatch scenarios).

name: Trigger Terraform Orchestration

permissions:
  id-token: write        # Needed for OIDC authentication
  contents: read         # Needed for the checkout action
  actions: read          # Needed for the upload-sarif action
  security-events: write # Needed for the upload-sarif action
  pull-requests: write   # Needed to post Terraform plan as PR comment

on:
  push:
    paths:
      - 'infrastructure/virtual-machines/**'
  pull_request:
    paths:
      - 'infrastructure/virtual-machines/**'
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Detect which VM directories changed in this push/PR
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect changed VM directories
    runs-on: ubuntu-latest
    outputs:
      vm_dirs: ${{ steps.find-dirs.outputs.vm_dirs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed VM directories
        id: find-dirs
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi

          DIRS=$(echo "$CHANGED" \
            | grep '^infrastructure/virtual-machines/' \
            | awk -F'/' '{print $1"/"$2"/"$3}' \
            | sort -u)

          if [ -z "$DIRS" ]; then
            echo "vm_dirs=[]" >> "$GITHUB_OUTPUT"
          else
            JSON=$(echo "$DIRS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "vm_dirs=$JSON" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed VM directories: $DIRS"

  # ---------------------------------------------------------------------------
  # dev – non-main branch push: plan + apply
  # ---------------------------------------------------------------------------
  dev:
    name: Dev – ${{ matrix.vm_dir }}
    needs: detect-changes
    if: github.ref != 'refs/heads/main' && github.event_name == 'push' && needs.detect-changes.outputs.vm_dirs != '[]'
    runs-on: ubuntu-latest
    concurrency: dev_infra_${{ matrix.vm_dir }}
    strategy:
      fail-fast: false
      matrix:
        vm_dir: ${{ fromJson(needs.detect-changes.outputs.vm_dirs) }}

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      TF_LOG: ${{ secrets.TF_LOG_LEVEL }}

    environment: dev

    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.vm_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false -backend-config=env/dev/dev.tfbackend

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Plan
        run: |
          terraform plan -input=false -out="plan.tfplan" -var-file="env/dev/dev.tfvars" -no-color \
            > "plan.tfplan.txt"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve plan.tfplan

  # ---------------------------------------------------------------------------
  # test – pull request to main: plan only, security analysis enabled
  # ---------------------------------------------------------------------------
  test:
    name: Test – ${{ matrix.vm_dir }}
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.vm_dirs != '[]'
    runs-on: ubuntu-latest
    concurrency: test_infra_${{ matrix.vm_dir }}
    strategy:
      fail-fast: false
      matrix:
        vm_dir: ${{ fromJson(needs.detect-changes.outputs.vm_dirs) }}

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      TF_LOG: ${{ secrets.TF_LOG_LEVEL }}

    environment: test

    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.vm_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false -backend-config=env/test/test.tfbackend

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Plan
        run: |
          terraform plan -input=false -out="plan.tfplan" -var-file="env/test/test.tfvars" -no-color \
            > "plan.tfplan.txt"

      - name: Post Plan to Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ matrix.vm_dir }}/plan.tfplan.txt', 'utf8');
            const maxLength = 65000;
            let planOutput = plan.length > maxLength ? plan.substring(0, maxLength) + '\n...[truncated]' : plan;

            const vmName = '${{ matrix.vm_dir }}'.split('/').pop();
            const marker = `Terraform Plan for \`test\` – \`${vmName}\``;

            const body = `#### ${marker} 📝
            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${planOutput}
            \`\`\`

            </details>

            **Working Directory:** \`${{ matrix.vm_dir }}\`
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  # ---------------------------------------------------------------------------
  # prod – push to main: plan + apply, security analysis enabled
  # ---------------------------------------------------------------------------
  prod:
    name: Prod – ${{ matrix.vm_dir }}
    needs: detect-changes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.detect-changes.outputs.vm_dirs != '[]'
    runs-on: ubuntu-latest
    concurrency: prod_infra_${{ matrix.vm_dir }}
    strategy:
      fail-fast: false
      matrix:
        vm_dir: ${{ fromJson(needs.detect-changes.outputs.vm_dirs) }}

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      TF_LOG: ${{ secrets.TF_LOG_LEVEL }}

    environment: prod

    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.vm_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false -backend-config=env/prod/prod.tfbackend

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Plan
        run: |
          terraform plan -input=false -out="plan.tfplan" -var-file="env/prod/prod.tfvars" -no-color \
            > "plan.tfplan.txt"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve plan.tfplan
