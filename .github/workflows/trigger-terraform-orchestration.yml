# Purpose:
#   - Orchestrate Terraform plan and apply for every department root module
#     that was touched by a pull request or merge to main.
#   - Each department lives under infrastructure/example/<dept>/. Adding a new
#     department folder is all that is needed – this workflow detects it automatically.
#
# Environment routing:
#   test  → pull requests to main    (plan + apply)
#   prod  → merge to main            (plan + apply, requires reviewer approval)
#
# GitHub Environments (two total):
#   test  ← pull requests to main
#   prod  ← merges to main
#   Each environment holds OIDC secrets for its service principal:
#     AZURE_CLIENT_ID, AZURE_TENANT_ID, TF_LOG_LEVEL (optional)
#   prod should have a required-reviewers protection rule.
#
# Subscription routing:
#   Each GitHub environment holds an Actions variable named SUBSCRIPTION_MAP.
#   The value is a flat JSON object mapping department names to the subscription ID
#   for that environment, e.g.:
#     test → {"science":"<test-sub-id>","bizapps":"<test-sub-id>"}
#     prod → {"science":"<prod-sub-id>","bizapps":"<prod-sub-id>"}
#   Prod subscription IDs are scoped to the prod environment only. To add a
#   new department, add its folder and extend SUBSCRIPTION_MAP in each environment.
#
# Backend / variable files:
#   infrastructure/example/<dept>/env/<tier>/<tier>.tfbackend
#   infrastructure/example/<dept>/env/<tier>/<tier>.tfvars

name: Trigger Terraform Orchestration

permissions:
  id-token: write        # Needed for OIDC authentication
  contents: read         # Needed for the checkout action
  actions: read          # Needed for the upload-sarif action
  security-events: write # Needed for the upload-sarif action
  pull-requests: write   # Needed to post Terraform plan as PR comment

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/example/**'
  pull_request:
    paths:
      - 'infrastructure/example/**'
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

jobs:
  # ── Step 1: detect which BU directories changed ────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      env_suffix: ${{ steps.set-env.outputs.env_suffix }}
      github_environment: ${{ steps.set-env.outputs.github_environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment tier
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "env_suffix=test" >> $GITHUB_OUTPUT
            echo "github_environment=test" >> $GITHUB_OUTPUT
          else
            echo "env_suffix=prod" >> $GITHUB_OUTPUT
            echo "github_environment=prod" >> $GITHUB_OUTPUT
          fi

      - name: Detect changed virtual-machines directories
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          # Collect unique infrastructure/example/<dept> paths that changed
          DIRS=$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" \
            | grep '^infrastructure/example/' \
            | sed 's|^\(infrastructure/example/[^/]*\)/.*|\1|' \
            | sort -u)

          if [ -z "$DIRS" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            # Build a JSON array of {directory, bu} objects.
            # Subscription IDs are resolved later from vars.SUBSCRIPTION_MAP
            # scoped to the target GitHub environment.
            MATRIX=$(printf '%s\n' $DIRS \
              | jq -R '{directory: ., bu: (split("/") | .[2])}' \
              | jq -sc .)
            echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          fi

  # ── Step 2: run plan + apply for each changed BU ───────────────────────────
  terraform:
    needs: detect
    if: needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}
    environment: ${{ needs.detect.outputs.github_environment }}
    uses: ./.github/workflows/terraform-orchestration.yml
    secrets: inherit
    concurrency: ${{ matrix.directory }}-${{ needs.detect.outputs.env_suffix }}
    with:
      environment: "${{ needs.detect.outputs.github_environment }}"
      subscription_id: "${{ fromJson(vars.SUBSCRIPTION_MAP)[matrix.bu] }}"
      run_tf_apply: true
      working_directory: "./${{ matrix.directory }}"
      tfbackend_filepath: "./env/${{ needs.detect.outputs.env_suffix }}/${{ needs.detect.outputs.env_suffix }}.tfbackend"
      tfvars_filepath: "./env/${{ needs.detect.outputs.env_suffix }}/${{ needs.detect.outputs.env_suffix }}.tfvars"
      enable_security_analysis: true
      artifact_basename: "terraform-plan-${{ matrix.bu }}-${{ needs.detect.outputs.env_suffix }}"
