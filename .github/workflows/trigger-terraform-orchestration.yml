# Purpose:
#   - Orchestrate Terraform plan and apply for every department root module
#     that was touched by a pull request or merge to main.
#   - Each department lives under infrastructure/<dept>/virtual-machines/. Adding
#     a new department folder is all that is needed – this workflow detects it
#     automatically.
#
# Environment routing:
#   test  → pull requests to main    (plan + apply)
#   prod  → merge to main            (plan + apply, requires reviewer approval)
#
# GitHub Environments (two total):
#   test  ← pull requests to main
#   prod  ← merges to main
#   Each environment holds OIDC secrets for its service principal:
#     AZURE_CLIENT_ID, AZURE_TENANT_ID, TF_LOG_LEVEL (optional)
#   prod should have a required-reviewers protection rule.
#
# Subscription routing:
#   Each GitHub environment holds an Actions variable named SUBSCRIPTION_MAP.
#   The value is a flat JSON object mapping department names to the subscription ID
#   for that environment, e.g.:
#     test → {"science":"<test-sub-id>","bizapps":"<test-sub-id>"}
#     prod → {"science":"<prod-sub-id>","bizapps":"<prod-sub-id>"}
#   Prod subscription IDs are scoped to the prod environment only. To add a
#   new department, add its folder and extend SUBSCRIPTION_MAP in each environment.
#
# Backend / variable files:
#   infrastructure/<dept>/virtual-machines/env/<tier>/<tier>.tfbackend
#   infrastructure/<dept>/virtual-machines/env/<tier>/<tier>.tfvars

name: Trigger Terraform Orchestration

permissions:
  id-token: write        # Needed for OIDC authentication
  contents: read         # Needed for the checkout action
  actions: read          # Needed for the upload-sarif action
  security-events: write # Needed for the upload-sarif action
  pull-requests: write   # Needed to post Terraform plan as PR comment

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**/virtual-machines/**'
  pull_request:
    paths:
      - 'infrastructure/**/virtual-machines/**'
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

jobs:
  # ── Step 1: detect which department directories changed ─────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed department directories
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          # Collect unique infrastructure/<dept>/virtual-machines paths that changed
          DIRS=$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" \
            | grep '^infrastructure/' \
            | grep '/virtual-machines/' \
            | sed 's|/virtual-machines/.*|/virtual-machines|' \
            | sort -u)

          if [ -z "$DIRS" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            # Build a JSON array of {directory, bu} objects.
            # Subscription IDs are resolved later from vars.SUBSCRIPTION_MAP
            # scoped to the target GitHub environment.
            MATRIX=$(printf '%s\n' $DIRS \
              | jq -R '{directory: ., bu: (split("/") | .[1])}' \
              | jq -sc .)
            echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          fi

  # ── Step 2: run plan + apply for each changed department ────────────────────
  terraform:
    needs: detect
    if: needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}
    uses: ./.github/workflows/terraform-orchestration.yml
    secrets: inherit
    concurrency: ${{ matrix.directory }}-${{ github.event_name == 'pull_request' && 'test' || 'prod' }}
    with:
      environment: "${{ github.event_name == 'pull_request' && 'test' || 'prod' }}"
      bu: "${{ matrix.bu }}"
      run_tf_apply: true
      working_directory: "./${{ matrix.directory }}"
      tfbackend_filepath: "./env/${{ github.event_name == 'pull_request' && 'test' || 'prod' }}/${{ github.event_name == 'pull_request' && 'test' || 'prod' }}.tfbackend"
      tfvars_filepath: "./env/${{ github.event_name == 'pull_request' && 'test' || 'prod' }}/${{ github.event_name == 'pull_request' && 'test' || 'prod' }}.tfvars"
      enable_security_analysis: true
      artifact_basename: "terraform-plan-${{ matrix.bu }}-${{ github.event_name == 'pull_request' && 'test' || 'prod' }}"