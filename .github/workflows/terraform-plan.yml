###############################################################################
# Terraform Plan – runs on every pull request that touches infrastructure/
#
# Required repository secrets / variables:
#   AZURE_CLIENT_ID       – Service principal / managed identity client ID
#   AZURE_TENANT_ID       – Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID – Target subscription ID
#   TFSTATE_RESOURCE_GROUP    – Resource group containing the tfstate storage account
#   TFSTATE_STORAGE_ACCOUNT   – Storage account name for remote state
#   TFSTATE_CONTAINER         – Blob container name (e.g. "tfstate")
#
# Authentication uses Azure OIDC (Workload Identity Federation) – no secrets
# stored in GitHub. Configure the federated credential on your app registration
# to trust the subject: repo:<org>/<repo>:pull_request
###############################################################################

name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "infrastructure/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  id-token: write   # required for OIDC token request
  contents: read
  pull-requests: write  # to post plan output as a PR comment

env:
  TF_VERSION: "1.9.8"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  detect-changes:
    name: Detect changed VM directories
    runs-on: ubuntu-latest
    outputs:
      vm_dirs: ${{ steps.changes.outputs.vm_dirs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Identify changed infrastructure directories
        id: changes
        run: |
          # Get unique top-level VM directories that changed
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^infrastructure/virtual-machines/' \
            | awk -F'/' '{print $1"/"$2"/"$3}' \
            | sort -u)
          if [ -z "$CHANGED" ]; then
            echo "vm_dirs=[]" >> "$GITHUB_OUTPUT"
          else
            # Build JSON array
            JSON=$(echo "$CHANGED" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "vm_dirs=$JSON" >> "$GITHUB_OUTPUT"
          fi

  terraform-plan:
    name: Plan – ${{ matrix.vm_dir }}
    needs: detect-changes
    if: needs.detect-changes.outputs.vm_dirs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vm_dir: ${{ fromJson(needs.detect-changes.outputs.vm_dirs) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ matrix.vm_dir }}
        run: |
          # Extract VM name from directory path (last path segment)
          VM_NAME=$(basename "${{ matrix.vm_dir }}")
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=${VM_NAME}.terraform.tfstate"

      - name: Terraform Format Check
        working-directory: ${{ matrix.vm_dir }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ matrix.vm_dir }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ matrix.vm_dir }}
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ matrix.vm_dir }}/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n...[truncated]'
              : planOutput;
            const body = `### Terraform Plan – \`${{ matrix.vm_dir }}\`
            \`\`\`hcl
            ${truncated}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
