###############################################################################
# Terraform Destroy – manual workflow to destroy a specific VM
#
# Trigger: workflow_dispatch (manual only, never on push/PR)
# Required secrets: same as terraform-apply.yml
###############################################################################

name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      vm_dir:
        description: "Path to the VM directory, e.g. infrastructure/virtual-machines/example-vm"
        required: true
        type: string
      confirm:
        description: "Type DESTROY to confirm"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.8"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  terraform-destroy:
    name: Destroy – ${{ inputs.vm_dir }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Confirm destruction
        if: inputs.confirm != 'DESTROY'
        run: |
          echo "Confirmation string does not match. Aborting."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ inputs.vm_dir }}
        run: |
          VM_NAME=$(basename "${{ inputs.vm_dir }}")
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=${VM_NAME}.terraform.tfstate"

      - name: Terraform Destroy
        working-directory: ${{ inputs.vm_dir }}
        run: terraform destroy -auto-approve
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
